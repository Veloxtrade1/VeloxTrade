<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velox — Trading Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://s3.tradingview.com/tv.js"><\/script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0B0E17;--bg2:#111520;--bg3:#161B2E;--bg4:#1C2338;
  --border:#1E2540;--border2:#252D48;
  --text:#E8EDF8;--muted:#6B7A99;--muted2:#4A5568;
  --green:#00D4AA;--green2:#00B894;--greenbg:rgba(0,212,170,.1);--greenborder:rgba(0,212,170,.25);
  --red:#FF4757;--red2:#E84057;--redbg:rgba(255,71,87,.1);--redborder:rgba(255,71,87,.25);
  --blue:#4F8EF7;--bluebg:rgba(79,142,247,.1);--gold:#F7B731;
  --font:"Inter",sans-serif;--mono:"JetBrains Mono",monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.app{display:grid;grid-template-rows:48px 1fr;grid-template-columns:240px 1fr 300px;height:100vh}

/* TOPBAR */
.topbar{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:0;z-index:100}
.tb-logo{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.5px;padding-right:20px;border-right:1px solid var(--border);margin-right:16px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.tb-logo-box{width:26px;height:26px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff}
.tb-logo span{color:var(--blue)}
.tb-tickers{display:flex;flex:1;overflow:hidden}
.tb-tick{display:flex;flex-direction:column;padding:0 16px;border-right:1px solid var(--border);cursor:pointer;transition:.2s;height:48px;justify-content:center;min-width:0}
.tb-tick:hover,.tb-tick.act{background:var(--bg3)}
.tt-sym{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em;white-space:nowrap}
.tt-row{display:flex;align-items:center;gap:6px}
.tt-p{font-family:var(--mono);font-size:12px;font-weight:600;white-space:nowrap}
.tt-c{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;white-space:nowrap}
.up{color:#00D4AA}.dn{color:#FF4757}
.up-bg{background:rgba(0,212,170,.15);color:#00D4AA}.dn-bg{background:rgba(255,71,87,.15);color:#FF4757}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.bal-chip{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:4px 12px;display:flex;flex-direction:column;align-items:flex-end}
.bal-lbl{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.bal-val{font-family:var(--mono);font-size:13px;font-weight:700}
.tb-user{font-size:12px;color:var(--muted);padding:0 8px}
.tb-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:.2s}
.tb-dep{background:var(--green);color:#000}.tb-dep:hover{background:var(--green2)}
.tb-out{background:var(--bg3);color:var(--muted);border:1px solid var(--border2)}.tb-out:hover{color:var(--text)}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-search{padding:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-si{position:relative}
.sb-si i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:12px}
.sb-si input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:7px 10px 7px 30px;font-size:12px;color:var(--text);outline:none;font-family:var(--font)}
.sb-si input:focus{border-color:var(--blue)}
.sb-cats{display:flex;padding:8px;gap:4px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.cat{padding:4px 10px;border-radius:100px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:none;color:var(--muted);transition:.2s;font-family:var(--font)}
.cat.on,.cat:hover{background:var(--bluebg);border-color:var(--blue);color:var(--blue)}
.sym-list{overflow-y:auto;flex:1}
.sym-item{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;cursor:pointer;transition:.15s;border-bottom:1px solid rgba(255,255,255,.02)}
.sym-item:hover{background:var(--bg3)}
.sym-item.act{background:var(--bg3);border-left:2px solid var(--blue)}
.si-sym{font-size:12px;font-weight:600}
.si-name{font-size:10px;color:var(--muted);margin-top:1px}
.si-r{text-align:right}
.si-p{font-family:var(--mono);font-size:12px;font-weight:500}
.si-c{font-size:9px;font-family:var(--mono);margin-top:2px}

/* CENTER */
.center{display:flex;flex-direction:column;min-height:0;background:var(--bg)}
.chart-bar{display:flex;align-items:center;gap:12px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.cb-sym{font-size:16px;font-weight:700;letter-spacing:-.3px}
.cb-price{font-family:var(--mono);font-size:22px;font-weight:700}
.cb-chg{font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px}
.cb-info{display:flex;gap:20px;margin-left:8px}
.cb-stat{font-size:10px;color:var(--muted)}
.cb-stat b{display:block;font-size:11px;color:var(--text);font-weight:500;margin-bottom:1px;font-family:var(--mono)}
.tfs{display:flex;gap:2px;margin-left:auto}
.tf{padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--muted);font-family:var(--font);transition:.2s}
.tf.on{background:var(--bg3);color:var(--text)}
.tf:hover:not(.on){color:var(--text)}
#chartBox{flex:1;min-height:0}

/* BOTTOM */
.btabs{display:flex;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.btab{padding:8px 18px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:.2s;border-top:none;border-left:none;border-right:none;background:none;font-family:var(--font);display:flex;align-items:center;gap:6px}
.btab.on{color:var(--blue);border-bottom-color:var(--blue)}
.badge{background:var(--blue);color:#fff;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:800}
.bpanel{height:180px;overflow-y:auto;background:var(--bg2)}
table{width:100%;border-collapse:collapse}
th{padding:6px 12px;text-align:left;font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2)}
td{padding:8px 12px;font-size:11px;border-bottom:1px solid rgba(255,255,255,.03);font-family:var(--mono)}
tr:hover td{background:var(--bg3)}
.close-btn{padding:3px 10px;border-radius:4px;background:var(--redbg);border:1px solid var(--redborder);color:var(--red);font-size:9px;font-weight:700;cursor:pointer;font-family:var(--font)}
.close-btn:hover{background:var(--red);color:#fff}
.tag{padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;font-family:var(--font)}
.tag-b{background:var(--greenbg);color:var(--green);border:1px solid var(--greenborder)}
.tag-s{background:var(--redbg);color:var(--red);border:1px solid var(--redborder)}
.empty{text-align:center;color:var(--muted);font-size:12px;padding:40px;font-family:var(--font)}

/* RIGHT */
.rpanel{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.rp-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.rptab{flex:1;padding:10px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:.2s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.rptab.on{color:var(--blue);border-bottom-color:var(--blue)}
.rp-body{flex:1;overflow-y:auto;padding:14px}
.of-sym{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px}
.price-cards{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.pc{border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:.2s;border:1.5px solid transparent}
.pc-sell{background:var(--redbg);border-color:var(--redborder)}
.pc-buy{background:var(--greenbg);border-color:var(--greenborder)}
.pc-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;margin-bottom:4px}
.pc-sell .pc-lbl{color:var(--red)}.pc-buy .pc-lbl{color:var(--green)}
.pc-p{font-family:var(--mono);font-size:16px;font-weight:700}
.pc-sell .pc-p{color:var(--red)}.pc-buy .pc-p{color:var(--green)}
.pc-pips{font-size:9px;margin-top:2px;opacity:.6}
.of-label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px}
.of-inp{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:9px 11px;font-size:13px;color:var(--text);font-family:var(--mono);outline:none;margin-bottom:10px;transition:.2s}
.of-inp:focus{border-color:var(--blue)}
.of-sel{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:9px 11px;font-size:12px;color:var(--text);font-family:var(--font);outline:none;margin-bottom:10px}
.of-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.of-info{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:12px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.oi-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-bottom:2px}
.oi-v{font-family:var(--mono);font-size:12px;font-weight:600}
.exec-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
.sell-btn,.buy-btn{padding:12px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:var(--font);transition:.2s}
.sell-btn{background:var(--red);color:#fff}.sell-btn:hover{background:#c0392b}
.buy-btn{background:var(--green);color:#000}.buy-btn:hover{background:var(--green2)}
.risk-note{font-size:9px;color:var(--muted2);text-align:center;line-height:1.7}
.acct-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ag-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px}
.ag-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-bottom:4px}
.ag-val{font-family:var(--mono);font-size:14px;font-weight:700}
.ag-val.pos{color:var(--green)}.ag-val.neg{color:var(--red)}
.dep-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.dep-btn{padding:10px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;font-family:var(--font);transition:.2s;text-align:center}
.dep-go{background:var(--green);border-color:var(--green);color:#000}
.wd-go{background:var(--bg3);border-color:var(--border2);color:var(--text)}
.ai-row{display:flex;justify-content:space-between;font-size:11px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ai-row:last-child{border:none}
.ai-l{color:var(--muted)}.ai-v{font-family:var(--mono);font-weight:500}
.acct-info{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.5);transform:translateX(130%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;max-width:300px}
.toast.show{transform:translateX(0)}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.mbox{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;width:400px;position:relative;max-height:90vh;overflow-y:auto}
.mbox h3{font-size:16px;font-weight:700;margin-bottom:4px}
.mbox p{font-size:12px;color:var(--muted);margin-bottom:20px}
.mx{position:absolute;top:14px;right:14px;background:var(--bg3);border:1px solid var(--border);width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:12px}
.mx:hover{color:var(--text)}
.m-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.m-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:10px 12px;font-size:13px;color:var(--text);font-family:var(--mono);outline:none;margin-bottom:12px;transition:.2s}
.m-input:focus{border-color:var(--blue)}
.m-meth{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:16px}
.meth{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:10px 6px;text-align:center;cursor:pointer;transition:.2s}
.meth.sel,.meth:hover{border-color:var(--blue);background:var(--bluebg)}
.meth-ic{font-size:16px;margin-bottom:3px}
.meth-nm{font-size:10px;font-weight:600;color:var(--text)}
.meth-t{font-size:9px;color:var(--muted)}
.m-addr{background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:10px;margin-bottom:8px;font-size:10px;font-family:var(--mono);color:var(--muted);word-break:break-all;display:flex;justify-content:space-between;align-items:center;gap:8px}
.m-addr button{padding:4px 10px;border-radius:4px;background:var(--bluebg);border:1px solid var(--blue);color:var(--blue);font-size:10px;cursor:pointer;white-space:nowrap;font-family:var(--font);font-weight:600}
.m-sub{width:100%;padding:12px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:var(--font);transition:.2s}
.m-sub-g{background:var(--green);color:#000}.m-sub-r{background:var(--red);color:#fff}
@media(max-width:900px){.app{grid-template-columns:1fr};.sidebar,.rpanel{display:none}}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <div class="tb-logo"><div class="tb-logo-box">V</div>Vel<span>ox</span></div>
  <div class="tb-tickers" id="tbTickers"></div>
  <div class="tb-right">
    <div class="bal-chip"><div class="bal-lbl">Balance</div><div class="bal-val" id="topBal">$0.00</div></div>
    <div class="bal-chip" style="border-color:rgba(0,212,170,.25)"><div class="bal-lbl">Open P&L</div><div class="bal-val up" id="topPL">$0.00</div></div>
    <span class="tb-user"><i class="fas fa-user-circle"></i>&nbsp;<span id="topUser"></span></span>
    <button class="tb-btn tb-dep" onclick="openDep()">+ Deposit</button>
    <button class="tb-btn tb-out" onclick="doLogout()">Logout</button>
  </div>
</div>
<div class="sidebar">
  <div class="sb-search"><div class="sb-si"><i class="fas fa-search"></i><input type="text" placeholder="Search symbol..." oninput="filterSym(this.value)"></div></div>
  <div class="sb-cats">
    <button class="cat on" onclick="setCat('all',this)">All</button>
    <button class="cat" onclick="setCat('forex',this)">FX</button>
    <button class="cat" onclick="setCat('crypto',this)">Crypto</button>
    <button class="cat" onclick="setCat('commodities',this)">Metals</button>
    <button class="cat" onclick="setCat('indices',this)">Index</button>
    <button class="cat" onclick="setCat('stocks',this)">Stocks</button>
  </div>
  <div class="sym-list" id="symList"></div>
</div>
<div class="center">
  <div class="chart-bar">
    <span class="cb-sym" id="cbSym">EUR/USD</span>
    <span class="cb-price up" id="cbPrice">—</span>
    <span class="cb-chg up-bg" id="cbChg">+0.00%</span>
    <div class="cb-info">
      <div class="cb-stat"><b id="cbBid">—</b>Bid</div>
      <div class="cb-stat"><b id="cbAsk">—</b>Ask</div>
      <div class="cb-stat"><b id="cbSpr">—</b>Spread</div>
    </div>
    <div class="tfs">
      <button class="tf" onclick="setTF('1',this)">1M</button>
      <button class="tf" onclick="setTF('5',this)">5M</button>
      <button class="tf" onclick="setTF('15',this)">15M</button>
      <button class="tf on" onclick="setTF('60',this)">1H</button>
      <button class="tf" onclick="setTF('240',this)">4H</button>
      <button class="tf" onclick="setTF('D',this)">1D</button>
    </div>
  </div>
  <div id="chartBox" style="flex:1;min-height:0"></div>
  <div class="btabs">
    <button class="btab on" onclick="setTab('pos',this)">Positions <span class="badge" id="posCount">0</span></button>
    <button class="btab" onclick="setTab('hist',this)">History</button>
    <button class="btab" onclick="setTab('wallet',this)">Wallet</button>
  </div>
  <div class="bpanel" id="bpanel"><div class="empty">No open positions.</div></div>
</div>
<div class="rpanel">
  <div class="rp-tabs">
    <button class="rptab on" onclick="setRP('trade',this)">Trade</button>
    <button class="rptab" onclick="setRP('account',this)">Account</button>
  </div>
  <div class="rp-body">
    <div id="rp-trade">
      <div class="of-sym" id="ofSym">EUR/USD &middot; Forex</div>
      <div class="price-cards">
        <div class="pc pc-sell"><div class="pc-lbl">SELL</div><div class="pc-p" id="ofSell">—</div><div class="pc-pips">0.6 pips</div></div>
        <div class="pc pc-buy"><div class="pc-lbl">BUY</div><div class="pc-p" id="ofBuy">—</div><div class="pc-pips">0.6 pips</div></div>
      </div>
      <div class="of-label">Volume (Lots)</div>
      <input class="of-inp" type="number" id="ofVol" value="0.10" step="0.01" min="0.01" oninput="calcMargin()">
      <div class="of-label">Order Type</div>
      <select class="of-sel" id="ofType"><option value="market">Market Order</option><option value="limit">Limit Order</option><option value="stop">Stop Order</option></select>
      <div class="of-2">
        <div><div class="of-label">Stop Loss</div><input class="of-inp" type="number" id="ofSL" placeholder="Optional" style="margin-bottom:0"></div>
        <div><div class="of-label">Take Profit</div><input class="of-inp" type="number" id="ofTP" placeholder="Optional" style="margin-bottom:0"></div>
      </div>
      <div class="of-info" style="margin-top:10px">
        <div><div class="oi-l">Req. Margin</div><div class="oi-v" id="reqMargin">—</div></div>
        <div><div class="oi-l">Pip Value</div><div class="oi-v" id="pipVal">—</div></div>
        <div><div class="oi-l">Commission</div><div class="oi-v">$0.35/lot</div></div>
        <div><div class="oi-l">Leverage</div><div class="oi-v" style="color:#F7B731">1:500</div></div>
      </div>
      <div class="exec-btns">
        <button class="sell-btn" onclick="execOrder('sell')">&#9660; SELL</button>
        <button class="buy-btn" onclick="execOrder('buy')">&#9650; BUY</button>
      </div>
      <div class="risk-note">CFDs involve significant risk. 74-89% of retail accounts lose money.</div>
    </div>
    <div id="rp-account" style="display:none">
      <div class="acct-grid">
        <div class="ag-card"><div class="ag-lbl">Balance</div><div class="ag-val" id="acBal">$0.00</div></div>
        <div class="ag-card"><div class="ag-lbl">Equity</div><div class="ag-val" id="acEq">$0.00</div></div>
        <div class="ag-card"><div class="ag-lbl">Margin Used</div><div class="ag-val">$0.00</div></div>
        <div class="ag-card"><div class="ag-lbl">Open P&L</div><div class="ag-val pos" id="acPL">$0.00</div></div>
      </div>
      <div class="dep-row">
        <div class="dep-btn dep-go" onclick="openDep()">+ Deposit</div>
        <div class="dep-btn wd-go" onclick="openWD()">Withdraw</div>
      </div>
      <div class="acct-info">
        <div class="ai-row"><span class="ai-l">Email</span><span class="ai-v" id="acEmail">—</span></div>
        <div class="ai-row"><span class="ai-l">Country</span><span class="ai-v" id="acCountry">—</span></div>
        <div class="ai-row"><span class="ai-l">Account Type</span><span class="ai-v">Standard</span></div>
        <div class="ai-row"><span class="ai-l">Leverage</span><span class="ai-v" style="color:#F7B731">1:500</span></div>
        <div class="ai-row"><span class="ai-l">Currency</span><span class="ai-v">USD</span></div>
        <div class="ai-row"><span class="ai-l">KYC Status</span><span class="ai-v" style="color:#F7B731">Pending</span></div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- DEPOSIT MODAL -->
<div class="overlay" id="depModal">
  <div class="mbox">
    <div class="mx" onclick="closeMod('depModal')"><i class="fas fa-times"></i></div>
    <h3>Deposit Funds</h3>
    <p>Select method and send crypto to the address below</p>
    <div class="m-meth">
      <div class="meth sel" onclick="selM(this,'btc')"><div class="meth-ic">&#8383;</div><div class="meth-nm">Bitcoin</div><div class="meth-t">~1hr</div></div>
      <div class="meth" onclick="selM(this,'usdt')"><div class="meth-ic">&#128311;</div><div class="meth-nm">USDT</div><div class="meth-t">Instant</div></div>
      <div class="meth" onclick="selM(this,'eth')"><div class="meth-ic">&#9670;</div><div class="meth-nm">ETH</div><div class="meth-t">~30min</div></div>
    </div>
    <div id="dep-addr-box"></div>
    <div class="m-label">Amount (USD)</div>
    <input class="m-input" type="number" id="depAmt" placeholder="Min $10">
    <div class="m-label">Transaction Hash</div>
    <input class="m-input" type="text" id="depHash" placeholder="Paste TX hash after sending">
    <button class="m-sub m-sub-g" onclick="confirmDep()">Confirm Deposit</button>
    <div id="depMsg" style="font-size:12px;text-align:center;margin-top:8px;min-height:16px"></div>
  </div>
</div>

<!-- WITHDRAW MODAL -->
<div class="overlay" id="wdModal">
  <div class="mbox">
    <div class="mx" onclick="closeMod('wdModal')"><i class="fas fa-times"></i></div>
    <h3>Withdraw Funds</h3>
    <p>Withdrawals processed within 24 hours</p>
    <div class="m-label">Your Wallet Address</div>
    <input class="m-input" type="text" id="wdAddr" placeholder="Paste your wallet address">
    <div class="m-label">Amount (USD)</div>
    <input class="m-input" type="number" id="wdAmt" placeholder="Min $10">
    <button class="m-sub m-sub-r" onclick="confirmWD()">Request Withdrawal</button>
    <div id="wdMsg" style="font-size:12px;text-align:center;margin-top:8px;min-height:16px"></div>
  </div>
</div>

<div class="toast" id="toast">
  <span id="toastIcon" style="font-size:18px">&#10003;</span>
  <div><div style="font-size:13px;font-weight:600" id="toastTitle"></div><div style="font-size:11px;color:var(--muted)" id="toastMsg"></div></div>
</div>

<script src="/socket.io/socket.io.js"><\/script>
<script>
const token=localStorage.getItem("token");
if(!token)location.href="/";
const socket=io();
let prices={},prev={},positions=[],currentSym="EURUSD",currentTF="60";
let user=JSON.parse(localStorage.getItem("user")||"{}");

const SYMS=[
  {s:"EURUSD",n:"EUR/USD",cat:"forex"},{s:"GBPUSD",n:"GBP/USD",cat:"forex"},
  {s:"USDJPY",n:"USD/JPY",cat:"forex"},{s:"USDCHF",n:"USD/CHF",cat:"forex"},
  {s:"AUDUSD",n:"AUD/USD",cat:"forex"},{s:"USDCAD",n:"USD/CAD",cat:"forex"},
  {s:"NZDUSD",n:"NZD/USD",cat:"forex"},{s:"EURGBP",n:"EUR/GBP",cat:"forex"},
  {s:"EURJPY",n:"EUR/JPY",cat:"forex"},{s:"GBPJPY",n:"GBP/JPY",cat:"forex"},
  {s:"XAUUSD",n:"Gold",cat:"commodities"},{s:"XAGUSD",n:"Silver",cat:"commodities"},
  {s:"WTIUSD",n:"WTI Oil",cat:"commodities"},{s:"BRENTUSD",n:"Brent Oil",cat:"commodities"},
  {s:"BTCUSD",n:"Bitcoin",cat:"crypto"},{s:"ETHUSD",n:"Ethereum",cat:"crypto"},
  {s:"BNBUSD",n:"BNB",cat:"crypto"},{s:"SOLUSD",n:"Solana",cat:"crypto"},
  {s:"XRPUSD",n:"XRP",cat:"crypto"},{s:"ADAUSD",n:"Cardano",cat:"crypto"},
  {s:"LTCUSD",n:"Litecoin",cat:"crypto"},{s:"DOGEUSD",n:"Dogecoin",cat:"crypto"},
  {s:"US30",n:"Dow Jones",cat:"indices"},{s:"SPX500",n:"S&P 500",cat:"indices"},
  {s:"NAS100",n:"Nasdaq 100",cat:"indices"},{s:"DAX40",n:"DAX 40",cat:"indices"},
  {s:"FTSE100",n:"FTSE 100",cat:"indices"},
  {s:"AAPL",n:"Apple",cat:"stocks"},{s:"TSLA",n:"Tesla",cat:"stocks"},
  {s:"NVDA",n:"NVIDIA",cat:"stocks"},{s:"AMZN",n:"Amazon",cat:"stocks"},{s:"MSFT",n:"Microsoft",cat:"stocks"},
];
const TV_MAP={EURUSD:"FX:EURUSD",GBPUSD:"FX:GBPUSD",USDJPY:"FX:USDJPY",USDCHF:"FX:USDCHF",AUDUSD:"FX:AUDUSD",USDCAD:"FX:USDCAD",NZDUSD:"FX:NZDUSD",EURGBP:"FX:EURGBP",EURJPY:"FX:EURJPY",GBPJPY:"FX:GBPJPY",XAUUSD:"TVC:GOLD",XAGUSD:"TVC:SILVER",WTIUSD:"TVC:USOIL",BRENTUSD:"TVC:UKOIL",BTCUSD:"COINBASE:BTCUSD",ETHUSD:"COINBASE:ETHUSD",BNBUSD:"BINANCE:BNBUSDT",SOLUSD:"COINBASE:SOLUSD",XRPUSD:"BITSTAMP:XRPUSD",ADAUSD:"COINBASE:ADAUSD",LTCUSD:"COINBASE:LTCUSD",DOGEUSD:"BINANCE:DOGEUSDT",US30:"TVC:DJI",SPX500:"TVC:SPX",NAS100:"NASDAQ:NDX",DAX40:"XETR:DAX",FTSE100:"TVC:UKX",AAPL:"NASDAQ:AAPL",TSLA:"NASDAQ:TSLA",NVDA:"NASDAQ:NVDA",AMZN:"NASDAQ:AMZN",MSFT:"NASDAQ:MSFT"};
let catF="all",symF="";

function fmt(s,p){if(!p)return"—";if(["BTCUSD","ETHUSD","BNBUSD","SOLUSD"].includes(s))return p.toFixed(2);if(["US30","SPX500","NAS100","DAX40","FTSE100","AAPL","TSLA","NVDA","AMZN","MSFT"].includes(s))return p.toFixed(2);if(s.includes("JPY"))return p.toFixed(3);return p.toFixed(5);}
function el(id){return document.getElementById(id);}

socket.on("initPrices",d=>{prev={...(d.prices||d)};prices=d.prices||d;tick();});
socket.on("allPrices",d=>{prev={...prices};prices=d.prices||prices;tick();});
socket.on("priceUpdate",d=>{Object.assign(prices,d);tick();});

function tick(){renderSL();renderTB();updateCB();calcMargin();updateOF();renderPL();}

const TB=["EURUSD","XAUUSD","BTCUSD","US30","GBPUSD","ETHUSD"];
function renderTB(){
  el("tbTickers").innerHTML=TB.map(s=>{
    const p=prices[s]||0,pp=prev[s]||p,chg=pp?(p-pp)/pp*100:0,cls=chg>=0?"up":"dn",cbg=chg>=0?"up-bg":"dn-bg";
    return `<div class="tb-tick ${s===currentSym?"act":""}" onclick="selectSym('${s}')"><span class="tt-sym">${s.replace("USD","")}</span><span class="tt-row"><span class="tt-p ${cls}">${fmt(s,p)}</span><span class="tt-c ${cbg}">${chg>=0?"+":""}${chg.toFixed(2)}%</span></span></div>`;
  }).join("");
}

function renderSL(){
  const list=SYMS.filter(s=>(catF==="all"||s.cat===catF)&&(!symF||s.s.toLowerCase().includes(symF)||s.n.toLowerCase().includes(symF)));
  el("symList").innerHTML=list.map(({s,n})=>{
    const p=prices[s]||0,pp=prev[s]||p,chg=pp?(p-pp)/pp*100:0,cls=chg>=0?"up":"dn";
    return `<div class="sym-item ${s===currentSym?"act":""}" onclick="selectSym('${s}')"><div><div class="si-sym">${s}</div><div class="si-name">${n}</div></div><div class="si-r"><div class="si-p">${fmt(s,p)}</div><div class="si-c ${cls}">${chg>=0?"+":""}${chg.toFixed(3)}%</div></div></div>`;
  }).join("");
}
function setCat(c,e){catF=c;document.querySelectorAll(".cat").forEach(b=>b.classList.remove("on"));e.classList.add("on");renderSL();}
function filterSym(q){symF=q.toLowerCase();renderSL();}

function updateCB(){
  const p=prices[currentSym]||0,pp=prev[currentSym]||p,sp=p*.00005,chg=pp?(p-pp)/pp*100:0;
  const sym=SYMS.find(s=>s.s===currentSym)||{n:currentSym};
  el("cbSym").textContent=sym.n;
  el("cbPrice").textContent=fmt(currentSym,p);el("cbPrice").className="cb-price "+(chg>=0?"up":"dn");
  el("cbChg").textContent=(chg>=0?"+":"")+chg.toFixed(3)+"%";el("cbChg").className="cb-chg "+(chg>=0?"up-bg":"dn-bg");
  el("cbBid").textContent=fmt(currentSym,p-sp);el("cbAsk").textContent=fmt(currentSym,p+sp);
  el("cbSpr").textContent=(sp*2*10000).toFixed(1)+" pips";
}
function updateOF(){
  const p=prices[currentSym]||0,sp=p*.00005;
  el("ofBuy").textContent=fmt(currentSym,p+sp);el("ofSell").textContent=fmt(currentSym,p-sp);
}
function calcMargin(){
  const lots=parseFloat(el("ofVol").value)||.1,p=prices[currentSym]||1;
  el("reqMargin").textContent="$"+(p*lots*100000/500).toFixed(2);
  el("pipVal").textContent="$"+(lots*10).toFixed(2);
}

function loadChart(sym,tf){
  el("chartBox").innerHTML="";
  if(typeof TradingView==="undefined"){el("chartBox").innerHTML="<div style='display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:13px'>TradingView loading...</div>";return;}
  new TradingView.widget({autosize:true,symbol:TV_MAP[sym]||"FX:EURUSD",interval:tf==="D"?"1D":tf,timezone:"Etc/UTC",theme:"dark",style:"1",locale:"en",toolbar_bg:"#111520",enable_publishing:false,allow_symbol_change:false,container_id:"chartBox",backgroundColor:"#0B0E17",gridColor:"rgba(255,255,255,0.03)",studies:["RSI@tv-basicstudies"],hide_top_toolbar:false,save_image:false});
}
function setTF(tf,e){document.querySelectorAll(".tf").forEach(b=>b.classList.remove("on"));e.classList.add("on");currentTF=tf;loadChart(currentSym,tf);}

function selectSym(s){
  currentSym=s;renderSL();renderTB();updateCB();updateOF();calcMargin();
  const sym=SYMS.find(x=>x.s===s)||{n:s,cat:"—"};
  el("ofSym").textContent=sym.n+" \u00B7 "+sym.cat;
  loadChart(s,currentTF);
}

async function execOrder(side){
  const lots=parseFloat(el("ofVol").value)||.1;
  try{
    const r=await fetch("/api/trading/order",{method:"POST",headers:{"Content-Type":"application/json","x-auth-token":token},body:JSON.stringify({symbol:currentSym,side,quantity:lots})});
    const d=await r.json();
    if(r.ok){toast("\u2705","Trade Executed",side.toUpperCase()+" "+lots+" "+currentSym+" @ "+fmt(currentSym,prices[currentSym]),"green");user.balance=d.balance;el("topBal").textContent="$"+d.balance.toFixed(2);el("acBal").textContent="$"+d.balance.toFixed(2);loadPositions();}
    else toast("\u274C","Order Failed",d.msg,"red");
  }catch{toast("\u274C","Connection Error","Check your connection","red");}
}

async function loadPositions(){
  try{const r=await fetch("/api/account/positions",{headers:{"x-auth-token":token}});positions=await r.json();}catch{positions=[];}
  renderPositions();
}
function renderPositions(){
  el("posCount").textContent=positions.length;
  const panel=el("bpanel");
  if(!positions.length){panel.innerHTML="<div class='empty'>No open positions. Place your first trade \u2192</div>";return;}
  let tpl=0;
  const rows=positions.map(p=>{
    const cur=prices[p.symbol]||p.avgPrice,pl=(cur-p.avgPrice)*p.quantity;
    tpl+=pl;
    return `<tr><td>${p.symbol}</td><td><span class="tag tag-b">BUY</span></td><td>${p.quantity}</td><td>${fmt(p.symbol,p.avgPrice)}</td><td>${fmt(p.symbol,cur)}</td><td class="${pl>=0?"up":"dn"}">${pl>=0?"+":""}$${pl.toFixed(2)}</td><td><button class="close-btn" onclick="closePos('${p.symbol}',${p.quantity})">Close</button></td></tr>`;
  }).join("");
  panel.innerHTML=`<table><thead><tr><th>Symbol</th><th>Type</th><th>Lots</th><th>Entry</th><th>Current</th><th>P&L</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>`;
  const plStr=(tpl>=0?"+":"")+"$"+tpl.toFixed(2);
  el("topPL").textContent=plStr;el("topPL").className="bal-val "+(tpl>=0?"up":"dn");
  el("acPL").textContent=plStr;el("acPL").className="ag-val "+(tpl>=0?"pos":"neg");
}
function renderPL(){if(positions.length)renderPositions();}

async function closePos(symbol,quantity){
  try{
    const r=await fetch("/api/trading/order",{method:"POST",headers:{"Content-Type":"application/json","x-auth-token":token},body:JSON.stringify({symbol,side:"sell",quantity})});
    const d=await r.json();
    if(r.ok){toast("\u2705","Position Closed","","green");user.balance=d.balance;el("topBal").textContent="$"+d.balance.toFixed(2);loadPositions();}
    else toast("\u274C","Close Failed",d.msg,"red");
  }catch{toast("\u274C","Error","Try again","red");}
}

function setTab(tab,e){
  document.querySelectorAll(".btab").forEach(b=>b.classList.remove("on"));e.classList.add("on");
  if(tab==="pos")renderPositions();
  else if(tab==="hist")loadHistory();
  else if(tab==="wallet")loadWallet();
}
async function loadHistory(){
  try{
    const r=await fetch("/api/account/orders",{headers:{"x-auth-token":token}});
    const orders=await r.json();
    if(!orders.length){el("bpanel").innerHTML="<div class='empty'>No order history yet.</div>";return;}
    el("bpanel").innerHTML=`<table><thead><tr><th>Symbol</th><th>Type</th><th>Lots</th><th>Price</th><th>Status</th></tr></thead><tbody>${orders.map(o=>`<tr><td>${o.symbol}</td><td><span class="tag tag-${o.side==="buy"?"b":"s"}">${o.side.toUpperCase()}</span></td><td>${o.quantity}</td><td>${o.price?.toFixed(5)||"—"}</td><td style="color:var(--green)">${o.status}</td></tr>`).join("")}</tbody></table>`;
  }catch{el("bpanel").innerHTML="<div class='empty'>Connect to backend to view history.</div>";}
}
function loadWallet(){
  el("bpanel").innerHTML=`<div style="padding:16px"><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px"><div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 16px;flex:1"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:4px">BALANCE</div><div style="font-family:var(--mono);font-size:16px;font-weight:700;color:var(--green)">$${(user.balance||0).toFixed(2)}</div></div></div><div style="display:flex;gap:8px"><button onclick="openDep()" style="flex:1;padding:9px;border-radius:6px;background:var(--green);border:none;color:#000;font-weight:700;cursor:pointer;font-family:var(--font)">+ Deposit</button><button onclick="openWD()" style="flex:1;padding:9px;border-radius:6px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-weight:700;cursor:pointer;font-family:var(--font)">Withdraw</button></div></div>`;
}

function setRP(tab,e){
  document.querySelectorAll(".rptab").forEach(b=>b.classList.remove("on"));e.classList.add("on");
  el("rp-trade").style.display=tab==="trade"?"":"none";el("rp-account").style.display=tab==="account"?"":"none";
}

async function loadUser(){
  try{const r=await fetch("/api/account/me",{headers:{"x-auth-token":token}});if(r.ok){const u=await r.json();user={...user,...u};localStorage.setItem("user",JSON.stringify(user));}}catch{}
  el("topUser").textContent=user.email||"";el("topBal").textContent="$"+(user.balance||0).toFixed(2);
  el("acBal").textContent="$"+(user.balance||0).toFixed(2);el("acEq").textContent="$"+(user.balance||0).toFixed(2);
  el("acEmail").textContent=user.email||"—";el("acCountry").textContent=user.country||"—";
}

const ADDRS={btc:{addr:"Set BTC address in .env",net:"Bitcoin Network"},usdt:{addr:"Set USDT address in .env",net:"TRON TRC20"},eth:{addr:"Set ETH address in .env",net:"Ethereum ERC20"}};
function selM(e,m){e.closest(".m-meth").querySelectorAll(".meth").forEach(x=>x.classList.remove("sel"));e.classList.add("sel");showAddr(m);}
function showAddr(m){
  const info=ADDRS[m]||ADDRS.btc;
  el("dep-addr-box").innerHTML=`<div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:5px">${m.toUpperCase()} - ${info.net}</div><div class="m-addr"><span>${info.addr}</span><button onclick="navigator.clipboard.writeText('${info.addr}');this.textContent='Copied!'">Copy</button></div><div style="font-size:10px;color:var(--muted);margin-bottom:12px">Minimum deposit $10.</div>`;
}
function openDep(){el("depModal").classList.add("open");showAddr("btc");}
function openWD(){el("wdModal").classList.add("open");}
function closeMod(id){el(id).classList.remove("open");}

async function confirmDep(){
  const amt=parseFloat(el("depAmt").value),hash=el("depHash").value.trim(),msg=el("depMsg");
  if(!amt||amt<10){msg.style.color="var(--red)";msg.textContent="Minimum deposit is $10.";return;}
  if(!hash){msg.style.color="var(--red)";msg.textContent="Enter your transaction hash.";return;}
  msg.style.color="var(--muted)";msg.textContent="Submitting...";
  try{
    const r=await fetch("/api/account/confirm-deposit",{method:"POST",headers:{"Content-Type":"application/json","x-auth-token":token},body:JSON.stringify({txHash:hash,amount:amt,currency:"USD"})});
    const d=await r.json();
    if(r.ok){msg.style.color="var(--green)";msg.textContent="Deposit submitted! Balance: $"+d.balance.toFixed(2);user.balance=d.balance;el("topBal").textContent="$"+d.balance.toFixed(2);toast("\u2714","Deposit Submitted","Pending confirmation","green");}
    else{msg.style.color="var(--red)";msg.textContent=d.msg||"Failed";}
  }catch{msg.style.color="var(--red)";msg.textContent="Connection error";}
}
async function confirmWD(){
  const amt=parseFloat(el("wdAmt").value),addr=el("wdAddr").value.trim(),msg=el("wdMsg");
  if(!amt||amt<10){msg.style.color="var(--red)";msg.textContent="Minimum $10.";return;}
  if(!addr){msg.style.color="var(--red)";msg.textContent="Enter wallet address.";return;}
  msg.style.color="var(--green)";msg.textContent="Withdrawal request submitted. Processed within 24hrs.";
  toast("\u2714","Withdrawal Requested","$"+amt+" being processed","green");
  setTimeout(()=>closeMod("wdModal"),2000);
}

let tTimer;
function toast(icon,title,msg,type="green"){
  el("toastIcon").textContent=icon;el("toastTitle").textContent=title;el("toastMsg").textContent=msg;
  const t=el("toast");t.style.borderColor=type==="green"?"rgba(0,212,170,.25)":"rgba(255,71,87,.25)";
  t.classList.add("show");clearTimeout(tTimer);tTimer=setTimeout(()=>t.classList.remove("show"),4000);
}

function doLogout(){localStorage.clear();location.href="/";}
["depModal","wdModal"].forEach(id=>{el(id).addEventListener("click",function(e){if(e.target===this)closeMod(id);});});

loadUser();loadPositions();renderSL();loadChart("EURUSD","60");
setInterval(renderPL,1000);
<\/script>
</body>
</html>
